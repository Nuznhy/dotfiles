# ####################################################################################### AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

env = ENCHANT_CONFIG_DICT,en_US,uk_UA
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = XDG_CURRENT_DESKTOP,Hyprland

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor = DP-2, 3840x2160@143.86, 0x0, 1.5

monitorv2 {
    output = DP-1
    mode = 3840x2160@240.02
    # mode = 1920x1080@480.00
    position = 0x0
    scale = 1.25
    # scale = 1

    # vrr = true
    bitdepth = 10

    # cm = hdr
    supports_hdr = 1
    supports_wide_color = 1

    sdrbrightness = 1.5
    sdrsaturation = 1.0
}

# monitor = DP-2, 3840x2160@60, 0x0, 1.3333333
# monitor = DP-2, 3840x2160, 0x0, 1.6
# monitorv2 {
#     output = DP-3 
#     mode = 3840x2160@143.86 
#     position = -3840x0
#     scale = 1
#     transform = 90
#     # disabled = true
# }

monitorv2 {
    output = DP-2 
    mode = 960x640
    position = -960x640
    scale = 1
    # disabled = true
}
# monitor = DP-2, disabled
# monitor = DP-1, disabled
#monitor = HDMI-A-1, 3840x2160@60.0, 0x0, 2
monitorv2 {
    output = HDMI-A-1
    mode = 3840x2160@60.0
    position = 0x0
    disabled = true
}
xwayland {
  force_zero_scaling = true
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nautilus 
# $menu = wofi --show drun --conf $HOME/.config/wofi/config/config --style $HOME/.config/wofi/src/frappe/style.css --alow-images
$ipc = qs -c noctalia-shell ipc call
# $menu = $ipc launcher toggle
$menu = rofi -show drun -show-icons -display-drun ""


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#exec-once = waybar
exec-once = qs -c noctalia-shell --no-duplicate
exec-once = sudo ldmtool create all
#exec-once = hyprpaper
exec-once = awww-daemon &
exec-once = awww img -o DP-2 ~/wallpaper/marin-rose-pine.png
exec-once = awww img -o DP-1 ~/wallpaper/fern-desktop.png
# exec-once = ~/.config/hypr/scripts/wallpapers-change.sh
exec-once = workstyle &> /tmp/workstyle.log
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user restart hypr-tiling-fix.service
exec-once = openrgb --server --startminimized --profile pink.orp
exec-once = wl-paste --watch cliphist store
exec-once = syncthing
# exec-once = nm-applet &

#for libadwaita gtk4 apps you can use this command:
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

#for gtk3 apps you need to install adw-gtk3 theme (in arch linux sudo pacman -S adw-gtk-theme)
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps

#for kde apps you need to install: sudo pacman -S qt5ct qt6ct kvantum kvantum breeze-icons   
#you will need to set dark theme for qt apps from kde more difficult thans with gnome :D:

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = GDK_SCALE,2
env = LIBVA_DRIVER_NAME,nvidia
env = QT_AUTO_SCREEN_SCALE_FACTOR,2
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORMTHEME,kde
env = LIBVA_DRIVER_NAME,nvidia

env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

cursor {

    no_hardware_cursors = true

} 
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
# https://wiki.hyprland.org/Configuring/Variables/#decoration
# https://wiki.hyprland.org/Configuring/Variables/#animations
source = ~/.config/hypr/themes/rose-pine.conf

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1, layout:Master
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ua 
    kb_variant =
    kb_model =
    repeat_delay = 250
    repeat_rate = 35
    kb_options = grp:caps_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true 
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = SUPER, M, exec, hyprctl dispatch exit; loginctl kill-user $(whoami) 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy --type image/png
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/toggle-monitors.sh
bind = $mainMod, F2, exec, ~/.config/hypr/scripts/steam-gamescope.sh
bind = $mainMod SHIFT, D, exec, ~/.config/hypr/scripts/toggle-theme-noctalia.sh

### Dwindle ###
# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, P, pseudo, 
bind = $mainMod, space, layoutmsg, togglesplit 
bind = $mainMod, F, fullscreen

bind = $mainMod CTRL, h, resizeactive, -20 0
bind = $mainMod CTRL, l, resizeactive, 20 0
bind = $mainMod CTRL, j, resizeactive, 0 20
bind = $mainMod CTRL, k, resizeactive, 0 -20

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

### Scrolling ###
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, j, layoutmsg, focus down
bind = $mainMod, k, layoutmsg, focus up

# Move window to left/right column
bind = $mainMod SHIFT, h, layoutmsg, movewindowto l
bind = $mainMod SHIFT, l, layoutmsg, movewindowto r

# Swap entire column left/right
bind = $mainMod SHIFT, j, layoutmsg, swapcol l
bind = $mainMod SHIFT, k, layoutmsg, swapcol r

# Resize the focused column
bind = $mainMod SHIFT, comma, layoutmsg, colresize -conf
bind = $mainMod SHIFT, period, layoutmsg, colresize +conf

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-up.sh
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Suppress maximize events for all windows 
# (ignores maximize events so tiling logic won't react)
# Suppress maximize events globally
windowrule {
    name = Suppress Maximize
    match:class = .*
    suppress_event = maximize
}

# Fix dragging issues with xwayland floating windows
windowrule {
    name = Fix XWayland Dragging
    match:xwayland = true
    match:fullscreen = false
    match:class = ^$
    match:title = ^$
    no_focus = true
}


windowrule {
    name = YouTube Full Opacity
    match:title = ^.*[Yy]ou[Tt]ube.*
    opacity = 1.0 override
}

# Center JetBrains IDE windows
windowrule {
    name = Center JetBrains
    match:class = jetbrains-idea
    center = true
}

##############################
###  Autostart with rules  ###
##############################
# windowrulev2 = workspace 2, monitor:DP-2, match:class^(zen)$
windowrule {
    name = zen-position 
    match:class = ^(zen)$
    workspace = 2
}
exec-once = zen-browser

#windowrulev2 = workspace 4, monitor:DP-2, class:^(steam)$
#exec-once = steam 

# windowrulev2 = workspace 3, monitor:DP-2, match:class:^(discord)$
windowrule {
    name = dicord-position 
    match:class = ^(discord)$
    workspace = 3
}
exec-once = discord 

# windowrulev2 = workspace 3, monitor:DP-2, match:class:^(spotify)$
windowrule {
    name = spotify-position
    match:class = ^(Spotify)$
    workspace = 3
}
exec-once = spotify

# windowrulev2 = workspace 3, monitor:DP-2, match:class:^(org.telegram.desktop)$
windowrule {
    name = telegram-position
    match:class = ^(org.telegram.desktop)$
    workspace = 3
}
exec-once = Telegram 

# windowrulv2 = workspace 1, monitor:DP-2, match:class^(com.mitchellh.ghostty)$
# Specific opacity rules
windowrule {
    name = Ghostty Opacity
    match:class = ^(com.mitchellh.ghostty)$
    opacity = 0.9 override
    size = (monitor_w*0.8) (monitor_h * 0.95)
    persistent_size = on
    workspace = 1
    float = true
    center = true 
}
exec-once = $terminal -e zsh -i -c "fastfetch; exec zsh -i"
exec-once = sh -c 'sleep 3 && hyprctl dispatch workspace 1'

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

windowrule {
    name = calc-float
    float = true,
    match:class = ^(org\.gnome\.Calculator)$
}

windowrule {
    name = steam-float
    float = true
    match:class=(^steam$|^Steam$|steamwebhelper)
}

windowrule {
    name = tg-no-anim
    match:class = ^(org.telegram.desktop)$
    match:title = ^(Media viewer)$
    float = true
    animation = false
}

